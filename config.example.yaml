# Copy to config.yaml and mount at /config/config.yaml (CONFIG_PATH).
# Secrets: never inline — use double-brace env refs e.g. MYKEY (resolved at startup).
settings:
  title: Homelab
  # Theming (all optional; these are the defaults)
  # theme:
  #   mode: dark            # dark | light | auto (follows the OS)
  #   density: comfortable  # comfortable | compact
  #   accent: "#e0a575"     # optional brand accent (links, active nav, focus ring)

# --- Authentication (optional) ---------------------------------------------
# By default the dashboard is OPEN (provider: none). app-level auth trusts an
# identity header set by your reverse proxy / identity-aware proxy.
#
# With provider: forward-header the header is UNSIGNED. It is only an access
# boundary if your proxy is the ONLY thing that can reach this app (isolate the
# network / bind to the proxy). On a shared Docker network, sibling containers
# can forge it.
#
# auth:
#   provider: forward-header        # none (default) | forward-header | cf-access-jwt
#   preset: cloudflare              # cloudflare | authelia | authentik | oauth2-proxy | tailscale | custom
#   required: true                  # 401 the API when no identity is present
#   # header: X-Forwarded-Email     # overrides the preset; REQUIRED when preset: custom.
#   #                               # NOTE: point at a single-value header (an email/login),
#   #                               # not a comma-joined one like Remote-Groups.
#   # trustedProxies: ["10.20.0.2/32"]  # optional: the LAST-HOP proxy's address (a /32, not a subnet)
#   # logoutUrl: /cdn-cgi/access/logout # optional; preset fills a sensible default
#
# Cloudflare Access (SIGNED — safe even on a shared network, no isolation needed):
# cryptographically verifies the Cf-Access-Jwt-Assertion token against Cloudflare's JWKS.
# auth:
#   provider: cf-access-jwt
#   teamDomain: your-team.cloudflareaccess.com  # your Access team domain
#   aud: your-access-app-aud-tag                # string or list; scopes the token to one Access app
#   required: true
auth:
  provider: none

hosts:
  - id: homelab
    label: homelab
    source: { type: prometheus, instance: homelab }
    links:
      - { label: Grafana, url: https://grafana.example.com }
  - id: kvm4
    label: kvm4
    source: { type: prometheus, instance: kvm4 }
  - id: nas
    label: nas
    kind: storage
    source: { type: prometheus, instance: homelab, mountpoint: /mnt/nas-media }
    links:
      - { label: UniFi, url: https://192.168.1.20 }

groups:
  - name: Media
    widgets:
      - type: sonarr
        url: http://192.168.1.10:8989
        key: "{{SONARR_KEY}}"
      - type: radarr
        url: http://192.168.1.10:7878
        key: "{{RADARR_KEY}}"
      - type: prowlarr
        url: http://192.168.1.10:9696
        key: "{{PROWLARR_KEY}}"
      - type: overseerr
        url: http://192.168.1.10:5055
        key: "{{OVERSEERR_KEY}}"
      - type: plex
        url: http://192.168.1.10:32400
        token: "{{PLEX_TOKEN}}"
      - type: qbittorrent
        url: http://192.168.1.10:8080
        username: admin
        password: "{{QBIT_PASS}}"
  - name: Infra
    widgets:
      - type: adguard
        url: http://192.168.1.10:3001
        username: admin
        password: "{{ADGUARD_PASS}}"
      - type: bookmarks
        items:
          - { label: Portainer, url: https://portainer.example.com }
          - { label: Grafana, url: https://grafana.example.com }
